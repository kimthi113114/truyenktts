<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8">
    <title>Extract #content-chapter Hàng loạt (Modern UI)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap"
        rel="stylesheet">
    <link rel="icon" href="icon/favico.ico" type="image/x-icon">

    <link rel="stylesheet" href="css/index.css">
    <style>
        /* Toggle Switch CSS */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            -webkit-transition: .4s;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            -webkit-transition: .4s;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: #2196F3;
        }

        input:focus+.slider {
            box-shadow: 0 0 1px #2196F3;
        }

        input:checked+.slider:before {
            -webkit-transform: translateX(26px);
            -ms-transform: translateX(26px);
            transform: translateX(26px);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>📚 Trích xuất và Biên tập Nội dung Chương truyện Hàng loạt</h1>
            <p class="subtitle">Hiển thị **tối đa 20 chương/trang** để tối ưu hiệu suất khi chỉnh sửa nội dung lớn.</p>
        </div>
        <div class="content-wrapper">

            <div class="card">
                <h2 class="card-title">⚙️ Cấu hình</h2>
                <form id="form">
                    <div class="settings-row-4">
                        <div class="input-group">
                            <label for="url">URL Cơ sở/Mẫu (Kết thúc bằng phần số chương sẽ thay đổi):</label>

                            <input id="url" type="url" placeholder="VD: https://truyenchuhay.vn/ten-truyen/chuong-"
                                required list="urlSuggestions"
                                value="https://metruyencv.com/truyen/toan-dan-lanh-chua-tu-nu-anh-hung-dung-hop-bat-dau/chuong-"
                                style="width: 100%;">

                            <datalist id="urlSuggestions">
                                <option
                                    value="https://metruyencv.com/truyen/giet-xuyen-my-khung-tu-nu-phu-thuy-hoi-nghi-bat-dau/chuong-">
                                </option>
                                <option
                                    value="https://truyenchuhay.vn/giet-xuyen-phim-kinh-di-my-tu-american-horror-story-bat-dau/chuong-">
                                </option>
                                <option value="https://metruyencv.com/truyen/ta-homelander-muon-lam-gi-thi-lam/chuong-">
                                </option>
                                <option
                                    value="https://metruyencv.com/truyen/chu-nha-a-di-khen-ta-that-gioi-giang/chuong-">
                                </option>
                            </datalist>
                        </div>
                        <div class="input-group" style="display: none;">
                            <label for="geminiApiKey">🔑 Gemini API Key:</label>
                            <input type="password" id="geminiApiKey" placeholder="Nhập API Key..." class="url-input"
                                value="AIzaSyCcB5jLBMAdkQ9mXsFf_q4kDVQgUW9kYtw" style="flex: 2;">
                        </div>
                        <div class="chapter-range input-group">
                            <div class="control-group">
                                <label for="start-chapter">Từ chương:</label>
                                <input id="start-chapter" type="number" min="1" value="20" required>
                            </div>
                        </div>
                        <div class="chapter-range input-group">
                            <label for="end-chapter">Chương Kết thúc:</label>
                            <input id="end-chapter" type="number" min="1" value="45" required>
                        </div>
                        <div class="chapter-range input-group">
                            <label for="custom-start-chapter">SỐ BẮT ĐẦU (Output):</label>
                            <input id="custom-start-chapter" type="number" min="1" placeholder="Mặc định = Từ chương"
                                title="Nếu nhập 250, chương đầu tiên (ví dụ 1) sẽ được đánh số lại là 250">
                        </div>
                        <div class="input-group"
                            style="flex-direction: column; align-items: flex-start; gap: 5px;padding-top: 10px;">
                            <label for="autoFillEdited" style="margin: 0; cursor: pointer; font-weight: 500;">Tự động
                                điền vào ô Đã Sửa?</label>
                            <label class="switch">
                                <input type="checkbox" id="autoFillEdited" checked>
                                <span class="slider round"></span>
                            </label>
                        </div>
                        <div class="input-group"
                            style="flex-direction: column; align-items: flex-start; gap: 5px;padding-top: 10px;">
                            <label for="enableSplitChapter" style="margin: 0; cursor: pointer; font-weight: 500;">Tự
                                động
                                tách chương dài (>10k ký tự)?</label>
                            <label class="switch">
                                <input type="checkbox" id="enableSplitChapter" checked>
                                <span class="slider round"></span>
                            </label>
                        </div>
                    </div>
                    <div class="settings-row-4">
                        <button type="submit" id="fetchBtn">🚀 Lấy Nội dung Hàng loạt</button>
                    </div>
                </form>
            </div>

            <div id="status" class="status-message"></div>

            <div class="card">
                <h2 class="card-title">🛠️ Công cụ & Tải xuống</h2>
                <div class="action-section">
                    <button type="button" id="downloadAllResultsBtn" class="download-button"
                        onclick="downloadAllChapterResults()" disabled>
                        ⬇️ Tải Xuống Toàn Bộ Kết Quả (Đã Sửa)
                    </button>
                    <button type="button" id="export-epub" class="download-button" onclick="exportImportedToEpub()">
                        ⬇️ Xuất File Epub
                    </button>
                    <button type="button" id="export-epub-NoToc" class="download-button"
                        onclick="exportImportedToEpubNoToc()">
                        ⬇️ Xuất File Epub NoToc
                    </button>

                    <!-- TTS Settings Dialog -->
                    <dialog id="ttsDialog"
                        style="border: none; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); padding: 30px; max-width: 450px; width: 100%; background: white;">
                        <h3
                            style="margin-top: 0; color: var(--primary); margin-bottom: 20px; font-family: 'Poppins', sans-serif;">
                            🎧 Cấu hình TTS</h3>
                        <form method="dialog">
                            <div class="settings-row" style="margin-bottom: 15px;">
                                <div class="input-group">
                                    <label for="ttsStartChapter">Chương Bắt đầu:</label>
                                    <input type="number" id="ttsStartChapter" min="1" required style="width: 100%;">
                                </div>
                                <div class="input-group">
                                    <label for="ttsEndChapter">Chương Kết thúc:</label>
                                    <input type="number" id="ttsEndChapter" min="1" required style="width: 100%;">
                                </div>
                            </div>
                            <div class="settings-row" style="margin-bottom: 15px;">
                                <div class="input-group" style="margin-bottom: 15px;">
                                    <label for="ttsProvider">Provider:</label>
                                    <select id="ttsProvider" onchange="toggleVoiceField()"
                                        style="padding: 8px; border-radius: 4px; border: 1px solid #ced4da; width: 100%;">
                                        <option value="google">Google Translate TTS</option>
                                        <option value="edge">Microsoft Edge TTS</option>
                                    </select>
                                </div>
                                <div class="input-group" id="voiceGroup" style="margin-bottom: 15px; display: none;">
                                    <label for="ttsVoice">Voice (Edge only):</label>
                                    <select id="ttsVoice"
                                        style="padding: 8px; border-radius: 4px; border: 1px solid #ced4da; width: 100%;">
                                        <option value="vi-VN-NamMinhNeural">Nam Minh (Nam)</option>
                                        <option value="vi-VN-HoaiMyNeural">Hoài My (Nữ)</option>
                                    </select>
                                </div>
                            </div>
                            <div class="input-group" style="margin-bottom: 20px;">
                                <label for="ttsSpeed">Speed:</label>
                                <input type="number" id="ttsSpeed" value="1.0" step="0.1" min="0.5" max="2.0"
                                    style="padding: 8px; border-radius: 4px; border: 1px solid #ced4da; width: 100%;">
                            </div>
                            <div style="display: flex; justify-content: flex-end; gap: 10px;">
                                <button type="button" onclick="document.getElementById('ttsDialog').close()"
                                    style="background-color: #6c757d; color: white;">Hủy</button>
                                <button type="button" onclick="confirmSpeak()"
                                    style="background-color: #007bff; color: white;">🔊 Bắt đầu đọc</button>
                            </div>
                        </form>
                    </dialog>

                    <!-- Video Export Dialog -->
                    <dialog id="videoDialog"
                        style="border: none; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); padding: 30px; max-width: 450px; width: 100%; background: white;">
                        <h3
                            style="margin-top: 0; color: var(--danger); margin-bottom: 20px; font-family: 'Poppins', sans-serif;">
                            🎬 Cấu hình Video Export</h3>
                        <form method="dialog">
                            <div class="settings-row" style="margin-bottom: 15px;">
                                <div class="input-group">
                                    <label for="videoStartChapter">Chương Bắt đầu:</label>
                                    <input type="number" id="videoStartChapter" min="1" required style="width: 100%;">
                                </div>
                                <div class="input-group">
                                    <label for="videoEndChapter">Chương Kết thúc:</label>
                                    <input type="number" id="videoEndChapter" min="1" required style="width: 100%;">
                                </div>
                                <div class="input-group" style="margin-bottom: 15px;">
                                    <label for="videoProvider">Provider:</label>
                                    <select id="videoProvider" onchange="toggleVideoVoiceField()"
                                        style="padding: 8px; border-radius: 4px; border: 1px solid #ced4da; width: 100%;">
                                        <option value="google">Google Translate TTS</option>
                                        <option value="edge">Microsoft Edge TTS</option>
                                    </select>
                                </div>
                                <div class="input-group" id="videoVoiceGroup"
                                    style="margin-bottom: 15px; display: none;">
                                    <label for="videoVoice">Voice (Edge only):</label>
                                    <select id="videoVoice"
                                        style="padding: 8px; border-radius: 4px; border: 1px solid #ced4da; width: 100%;">
                                        <option value="vi-VN-NamMinhNeural">Nam Minh (Nam)</option>
                                        <option value="vi-VN-HoaiMyNeural">Hoài My (Nữ)</option>
                                    </select>
                                </div>
                                <div class="input-group" style="margin-bottom: 15px;">
                                    <label for="videoSpeed">Speed:</label>
                                    <input type="number" id="videoSpeed" value="1.0" step="0.1" min="0.5" max="2.0"
                                        style="padding: 8px; border-radius: 4px; border: 1px solid #ced4da; width: 100%;">
                                </div>
                                <div class="input-group" style="margin-bottom: 15px;">
                                    <label for="videoTheme">Theme:</label>
                                    <select id="videoTheme"
                                        style="padding: 8px; border-radius: 4px; border: 1px solid #ced4da; width: 100%;">
                                        <option value="co-trang">🏯 Cổ Trang (Vàng nâu)</option>
                                        <option value="hien-dai">🌆 Hiện Đại (Xám tối)</option>
                                        <option value="toi" selected>🌙 Tối (Đen)</option>
                                        <option value="sang">☀️ Sáng (Trắng)</option>
                                    </select>
                                </div>
                                <div class="input-group" style="margin-bottom: 15px;">
                                    <label for="videoCover">Chọn Truyện (Load Data):</label>
                                    <select id="videoCover" onchange="handleStorySelection(this)"
                                        style="padding: 8px; border-radius: 4px; border: 1px solid #ced4da; width: 100%;">
                                        <option value="">-- Chọn truyện --</option>
                                    </select>
                                </div>

                            </div>
                            <div style="display: flex; justify-content: flex-end; gap: 10px;">
                                <button type="button" onclick="document.getElementById('videoDialog').close()"
                                    style="background-color: #6c757d; color: white;">Hủy</button>
                                <button type="button" onclick="confirmVideoExport()"
                                    style="background-color: #dc3545; color: white;">🎬 Xuất Video</button>
                            </div>
                        </form>
                    </dialog>

                    <button type="button" id="export-ttf" class="download-button" onclick="openTTSDialog(event)">
                        ⬇️ Speak (TTS)
                    </button>
                    <button type="button" id="export-video" class="download-button" onclick="openVideoDialog(event)"
                        style="background-color: #dc3545;">
                        🎬 Xuất Video
                    </button>
                    <button type="button" id="loginMetruyen" class="download-button" onclick="loginMetruyen()">
                        ⬇️ loginMetruyen
                    </button>
                    <button type="button" id="initCopilot" class="download-button" onclick="initCopilot()"
                        style="background-color: #17a2b8;">
                        🤖 Init Copilot (Manual Login)
                    </button>

                    <button type="button" id="initChatGPT" class="download-button" onclick="initChatGPT()"
                        style="background-color: #17a2b8;">
                        🤖 Init ChatGPT
                    </button>

                    <a href="/" class="download-button btn-primary"
                        style="text-decoration: none; display: inline-flex; align-items: center; justify-content: center;">
                        🎧 Nghe Truyện (TTS Page)
                    </a>

                    <div class="input-group file-import-group">
                        <label for="importFile">Hoặc Import File .txt đã xuất (để tiếp tục chỉnh sửa):</label>
                        <input type="file" id="importFile" accept=".txt" onchange="handleFileImport(event)">
                    </div>
                    <button id="chatGPTAllBtn" style="display:flex;align-items:center;gap:8px;"
                        onclick="chatGPTAllBtn()">
                        <img src="https://chat.openai.com/favicon.ico" width="18" height="18" />
                        Gọi ChatGPT hàng loạt
                    </button>
                </div>
            </div>

            <div id="globalPagination" class="global-pagination" style="display: none;">
                <button id="prevPageBtn" class="next-previous-page-btn" onclick="changePage(-1)" disabled>◀ Trang
                    Trước</button>
                <span id="pageInfo" class="page-info">Trang 1/1</span>
                <button id="nextPageBtn" class="next-previous-page-btn" onclick="changePage(1)" disabled>Trang Sau
                    ▶</button>
            </div>

            <div id="results">
            </div>

            <div id="globalPaginationBottom" class="global-pagination" style="display: none;">
            </div>

        </div>
    </div>

    <div class="toast" id="toast">
        <span class="toast-icon">✅</span>
        <span class="toast-message">Thành công!</span>
    </div>

    <script>
        /**
         * =================================================================
         * 1. CONFIGURATION & CONSTANTS
         * =================================================================
         */
        const CONFIG = {
            CHAPTERS_PER_PAGE: 30,
            CONCURRENCY_LIMIT: 2, // Giới hạn số lượng request đồng thời
            API_ENDPOINTS: {
                GEMINI: '/api/gemini',
                TTS: 'http://localhost:3001/api/tts',
                VIDEO_EXPORT: 'http://localhost:3001/api/video-export',
                STORIES: '/api/stories',
                STORY_CONTENT: '/api/story-content',
                TTS_STATUS: '/api/tts/status',
                COPILOT_INIT: '/api/copilot/init',
                CHATGPT_INIT: '/api/chatgpt/init',
                COPILOT_ASK: '/api/copilot/ask'
            }
        };

        /**
         * =================================================================
         * 2. STATE MANAGEMENT
         * =================================================================
         */
        const state = {
            chapters: [],        // Mảng chứa objects: { chapterNumber, content, header, isCopied, isGenerated... }
            currentPage: 1,      // Trang hiện tại
            importedData: {      // Dữ liệu import từ file text
                titles: null,
                contents: null
            }
        };

        /**
         * =================================================================
         * 3. DOM ELEMENTS
         * =================================================================
         */
        const DOM = {
            form: document.getElementById("form"),
            inputs: {
                url: document.getElementById("url"),
                startChapter: document.getElementById("start-chapter"),
                endChapter: document.getElementById("end-chapter"),
                geminiApiKey: document.getElementById("geminiApiKey"),
                fileImport: document.getElementById("importFile"),
                customStartChapter: document.getElementById("custom-start-chapter"),
                autoFillEdited: document.getElementById("autoFillEdited")
            },
            buttons: {
                fetch: document.getElementById("fetchBtn"),
                download: document.getElementById("downloadAllResultsBtn"),
                prevPage: document.getElementById("prevPageBtn"),
                nextPage: document.getElementById("nextPageBtn")
            },
            display: {
                status: document.getElementById("status"),
                results: document.getElementById("results"),
                pageInfo: document.getElementById("pageInfo"),
                paginationTop: document.getElementById("globalPagination"),
                paginationBottom: document.getElementById("globalPaginationBottom"),
                toast: document.getElementById("toast")
            },
            dialogs: {
                tts: document.getElementById("ttsDialog"),
                video: document.getElementById("videoDialog")
            }
        };

        /**
         * =================================================================
         * 4. UTILITY FUNCTIONS
         * =================================================================
         */

        // Hàm làm sạch chuỗi
        const safeTrim = (text) => (text ?? "").toString().trim();

        // Hiển thị thông báo Toast
        const showToast = (message, type = 'success') => {
            const { toast } = DOM.display;
            const toastIcon = toast.querySelector('.toast-icon');
            const toastMessage = toast.querySelector('.toast-message');

            toastMessage.textContent = message;
            toast.className = `toast ${type}`;

            const icons = { success: '✅', error: '❌', warning: '⚠️' };
            toastIcon.textContent = icons[type] || 'ℹ️';

            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        };

        /**
         * =================================================================
         * 4.1 PERSISTENCE LOGIC (LOCAL STORAGE)
         * =================================================================
         */
        const saveFormData = () => {
            const data = {
                url: DOM.inputs.url.value,
                startChapter: DOM.inputs.startChapter.value,
                endChapter: DOM.inputs.endChapter.value,
                geminiApiKey: DOM.inputs.geminiApiKey.value,
                customStartChapter: DOM.inputs.customStartChapter.value,
                autoFillEdited: DOM.inputs.autoFillEdited.checked
            };
            localStorage.setItem('scraper_form_data', JSON.stringify(data));
        };

        const loadFormData = () => {
            const savedData = localStorage.getItem('scraper_form_data');
            if (savedData) {
                try {
                    const data = JSON.parse(savedData);
                    if (data.url) DOM.inputs.url.value = data.url;
                    if (data.startChapter) DOM.inputs.startChapter.value = data.startChapter;
                    if (data.endChapter) DOM.inputs.endChapter.value = data.endChapter;
                    if (data.geminiApiKey) DOM.inputs.geminiApiKey.value = data.geminiApiKey;
                    if (data.customStartChapter !== undefined) DOM.inputs.customStartChapter.value = data.customStartChapter;
                    if (data.autoFillEdited !== undefined) DOM.inputs.autoFillEdited.checked = data.autoFillEdited;
                } catch (e) {
                    console.error("Error loading saved data", e);
                }
            }
        };

        // Copy text vào clipboard
        const copyToClipboard = async (text) => {
            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText(text);
                    return true;
                } else {
                    // Fallback cũ
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand("copy");
                    document.body.removeChild(textArea);
                    return true;
                }
            } catch (err) {
                console.error("Clipboard Error:", err);
                return false;
            }
        };

        /**
         * =================================================================
         * 5. CORE LOGIC: DATA HANDLING & RENDERING
         * =================================================================
         */

        window.updateChapterHeader = (inputElement, chapterNumber) => {
            const chapterItem = state.chapters.find(item => item.chapterNumber === chapterNumber);
            if (chapterItem) chapterItem.header = inputElement.value;
        };

        window.updateChapterData = (textareaElement, chapterNumber) => {
            const chapterItem = state.chapters.find(item => item.chapterNumber === chapterNumber);
            if (chapterItem) chapterItem.editedContent = textareaElement.value;
        };

        // --- HÀM RENDER CHÍNH (Đã cập nhật logic hiển thị trạng thái) ---
        const renderCurrentPage = () => {
            const { results, paginationTop, paginationBottom, pageInfo } = DOM.display;
            const { prevPage, nextPage } = DOM.buttons;

            results.innerHTML = '';

            const totalChapters = state.chapters.length;
            if (totalChapters === 0) {
                paginationTop.style.display = 'none';
                paginationBottom.style.display = 'none';
                return;
            }

            const totalPages = Math.ceil(totalChapters / CONFIG.CHAPTERS_PER_PAGE);

            if (state.currentPage < 1) state.currentPage = 1;
            if (state.currentPage > totalPages) state.currentPage = totalPages;

            const startIndex = (state.currentPage - 1) * CONFIG.CHAPTERS_PER_PAGE;
            const endIndex = Math.min(startIndex + CONFIG.CHAPTERS_PER_PAGE, totalChapters);

            pageInfo.textContent = `Trang ${state.currentPage}/${totalPages} (Chương ${state.chapters[startIndex].chapterNumber} - ${state.chapters[endIndex - 1].chapterNumber})`;
            prevPage.disabled = state.currentPage === 1;
            nextPage.disabled = state.currentPage === totalPages;

            paginationTop.style.display = totalPages > 1 ? 'flex' : 'none';
            paginationBottom.style.display = totalPages > 1 ? 'flex' : 'none';
            paginationBottom.innerHTML = paginationTop.innerHTML;

            for (let i = startIndex; i < endIndex; i++) {
                const data = state.chapters[i];
                const chapterId = `chapter-${data.chapterNumber}`;
                const initialCharCount = data.editedContent.length;

                // --- LOGIC CLASS CSS & TEXT NÚT DỰA TRÊN STATE ---
                const copiedClass = data.isCopied ? 'copied-original' : '';
                const generatedClass = data.isGenerated ? 'is-generated' : '';

                const copyBtnText = data.isCopied ? '✅ Đã Copy' : '📋 Copy GỐC';

                const aiBtnClass = data.isGenerated ? 'btn-generated' : '';
                const aiBtnText = data.isGenerated ? '✅ Đã Rewrite (Chạy lại?)' : '✨ Gemini Rewrite';

                // --- LOGIC MÀU SẮC CHO COUNTER DỰA TRÊN SỰ KHÁC BIỆT ---
                const difference = data.originalContent.length - initialCharCount;
                let counterColor = '';
                if (difference >= 1300) {
                    counterColor = 'red';
                } else if (difference >= 1000) {
                    counterColor = 'orange';
                }

                const chapterHtml = `
                <section class="chapter-block ${data.isError ? 'error' : ''} ${copiedClass} ${generatedClass}" data-chapter-number="${data.chapterNumber}">
                    <div class="chapter-header-row">
                        <input 
                            type="text" 
                            value="${data.header}" 
                            class="chapter-header-input"
                            oninput="updateChapterHeader(this, ${data.chapterNumber})"
                        />
                        <span class="char-count-display flex">
                            (${data.originalContent.length.toLocaleString()} ký tự Gốc) - 
                            <span id="${chapterId}_counter" style="color: ${counterColor};">${initialCharCount.toLocaleString()} ký tự đã sửa</span>
                        </span>
                    </div>

                    <div class="chapter-row">
                        <div class="textarea-wrapper">
                            <label for="${chapterId}">Nội dung GỐC (Readonly):</label>

        /**

        const processSingleChapter = async (chapterNumber, baseUrl) => {
            const chapterUrl = baseUrl + chapterNumber;
            let lastError = null;

            for (let attempt = 1; attempt <= 5; attempt++) {
                try {
                    const response = await fetch(`/extract?url=${encodeURIComponent(chapterUrl)}`);
                    const data = await response.json();

                    if (!response.ok || data.error) {
                        throw new Error(data.error || "Lỗi tải từ server");
                    }

                    const bodyText = safeTrim(data.text || data.content);
                    // Nếu không có nội dung text thì coi là lỗi để retry
                    if (!bodyText) {
                        throw new Error("Không lấy được nội dung (Empty content)");
                    }

                    // Nếu thành công:
                    const safeTitle = safeTrim(data.chapterTitle);
                    const safeNum = safeTrim(data.chapterNumber);

                    const header = (safeNum || safeTitle)
                        ? `Chương ${safeNum || chapterNumber}: ${safeTitle}`
                        : `Chương ${chapterNumber}: (Không có tiêu đề)`;

                    const chapterLine = safeTrim(data.chapterLine);

                    const content = (chapterUrl.includes("metruyencv") ? "" : (chapterLine ? chapterLine + "\n\n" : "")) +
                        bodyText;

                    const importedContent = state.importedData.contents ? state.importedData.contents[chapterNumber] : null;

                    return {
                        chapterNumber,
                        header,
                        originalContent: content,
                        editedContent: importedContent || "",
                        isError: false,
                        isSuccess: true,
                        isCopied: false,
                        isGenerated: false
                    };

                } catch (err) {
                    console.warn(`Lỗi lấy chương ${chapterNumber} (Lần ${attempt}/5):`, err);
                    lastError = err;

                    if (attempt < 5) {
                        // Delay 2 giây trước khi thử lại
                        await new Promise(resolve => setTimeout(resolve, 2000));
                    }
                }
            }

            // Nếu thất bại sau 5 lần
            return {
                chapterNumber,
                header: `Chương ${chapterNumber}: LỖI TẢI (Sau 5 lần)`,
                originalContent: `❌ Lỗi: ${lastError ? lastError.message : "Timeout/Error"}`,
                editedContent: "",
                isError: true,
                isSuccess: false,
                isCopied: false,
                isGenerated: false
            };
        };

        // Helper function to split text - Enhanced to support unlimited parts
        const splitChapterContent = (text) => {
            const len = text.length;
            const TARGET_CHUNK_SIZE = 10000; // Target characters per part

            // No need to split if content is smaller than target
            if (len <= TARGET_CHUNK_SIZE) return [text];

            // Calculate number of parts needed (dynamically based on length)
            const numParts = Math.ceil(len / TARGET_CHUNK_SIZE);
            const approxChunkSize = Math.ceil(len / numParts);

            const parts = [];
            let startIndex = 0;

            for (let i = 0; i < numParts - 1; i++) {
                let cutIndex = startIndex + approxChunkSize;

                // Find nearest newline or period to avoid breaking mid-sentence
                let searchRange = 500; // Search window around cutIndex
                let foundIndex = -1;

                // Priority 1: Newline
                let searchStr = text.substring(
                    Math.max(0, cutIndex - searchRange),
                    Math.min(len, cutIndex + searchRange)
                );
                let relativeIndex = searchStr.lastIndexOf('\n');

                if (relativeIndex !== -1) {
                    foundIndex = Math.max(0, cutIndex - searchRange) + relativeIndex;
                } else {
                    // Priority 2: Period + Space
                    relativeIndex = searchStr.lastIndexOf('. ');
                    if (relativeIndex !== -1) {
                        foundIndex = Math.max(0, cutIndex - searchRange) + relativeIndex + 1; // Include the period
                    }
                }

                // Fallback: Hard cut if no good break point found
                if (foundIndex === -1) foundIndex = cutIndex;

                parts.push(text.substring(startIndex, foundIndex).trim());
                startIndex = foundIndex;
            }

            // Last part
            parts.push(text.substring(startIndex).trim());
            return parts;
        };

        DOM.form.addEventListener("submit", async (e) => {
            e.preventDefault();

            // Hiển thị cảnh báo xác nhận
            const confirmed = window.confirm("⚠️ Bạn có chắc chắn muốn lấy nội dung các chương?\n\nQuá trình này có thể mất một thời gian.");
            if (!confirmed) {
                return; // Hủy bỏ nếu người dùng không xác nhận
            }

            saveFormData(); // Lưu dữ liệu khi nhấn fetchBtn (submit)

            const startChapter = parseInt(DOM.inputs.startChapter.value, 10);
            const endChapter = parseInt(DOM.inputs.endChapter.value, 10);
            const baseUrl = DOM.inputs.url.value.trim();
            const customStartVal = document.getElementById("custom-start-chapter").value;
            let currentDisplayNum = customStartVal ? parseInt(customStartVal, 10) : startChapter;

            if (isNaN(startChapter) || isNaN(endChapter) || startChapter > endChapter) {
                DOM.display.status.textContent = "❌ Lỗi: Khoảng chương không hợp lệ.";
                return;
            }

            const totalChapters = endChapter - startChapter + 1;
            DOM.display.status.textContent = `⏳ Đang tải ${totalChapters} chương...`;
            DOM.display.status.className = "status-message loading";
            DOM.display.results.innerHTML = '';
            state.chapters = [];

            DOM.buttons.fetch.disabled = true;

            try {
                // Buffering mechanism for sequential processing
                const fetchedResults = new Map(); // Store results: { sourceChapterNum: result }
                let nextToProcess = startChapter;
                let activeFetches = 0;
                let fetchIndex = 0;
                const sourceChapterNumbers = Array.from({ length: totalChapters }, (_, i) => startChapter + i);

                // Initial batch trigger
                const startGenericFetch = (sourceNum) => {
                    activeFetches++;
                    processSingleChapter(sourceNum, baseUrl).then(result => {
                        fetchedResults.set(sourceNum, result);
                        activeFetches--;
                        processBuffer(); // Try to process buffer whenever a download finishes

                        // Queue next fetch if available
                        if (fetchIndex < sourceChapterNumbers.length) {
                            startGenericFetch(sourceChapterNumbers[fetchIndex++]);
                        }
                    });
                };

                const processBuffer = () => {
                    // Process generic loop: while nextToProcess is in buffer
                    while (fetchedResults.has(nextToProcess)) {
                        const result = fetchedResults.get(nextToProcess);
                        fetchedResults.delete(nextToProcess); // Free memory

                        if (result.isSuccess) {
                            // Apply Splitting Logic
                            const contentParts = splitChapterContent(result.originalContent);
                            const totalParts = contentParts.length;

                            contentParts.forEach((partContent, index) => {
                                const isMultiPart = totalParts > 1;
                                const partLabel = isMultiPart ? ` (Phần ${index + 1}/${totalParts})` : "";

                                // Create new chapter object
                                const newChapterNum = currentDisplayNum++; // Increment global counter
                                const shouldAutoFill = document.getElementById('autoFillEdited').checked;
                                const chapterObj = {
                                    chapterNumber: newChapterNum,
                                    header: result.header.replace(/Chương \d+/, `Chương ${newChapterNum}`) + partLabel,
                                    originalContent: partContent,
                                    editedContent: shouldAutoFill ? partContent : "", // Reset edited content to match splitted part
                                    isError: false,
                                    isSuccess: true,
                                    isCopied: false,
                                    isGenerated: false
                                };
                                state.chapters.push(chapterObj);
                            });

                        } else {
                            // Error case: Keep original error but update number
                            result.chapterNumber = currentDisplayNum++;
                            result.header = result.header.replace(/Chương \d+/, `Chương ${result.chapterNumber}`);
                            state.chapters.push(result);
                        }

                        nextToProcess++;
                    }

                    state.chapters.sort((a, b) => a.chapterNumber - b.chapterNumber); // Ensure sort (optional given logic)
                    renderCurrentPage();

                    const processedCount = nextToProcess - startChapter;
                    if (processedCount < totalChapters) {
                        DOM.display.status.textContent = `⏳ Đang tải và xử lý (${processedCount}/${totalChapters})...`;
                    } else {
                        // Finished
                        DOM.display.status.textContent = `✅ Hoàn thành: ${state.chapters.length} chương (Gốc: ${totalChapters}).`;
                        DOM.display.status.className = "status-message success";
                        DOM.buttons.download.disabled = false;
                        DOM.buttons.fetch.disabled = false;
                    }
                };

                // Start initial batch
                const initialBatchSize = Math.min(CONFIG.CONCURRENCY_LIMIT, totalChapters);
                for (let i = 0; i < initialBatchSize; i++) {
                    startGenericFetch(sourceChapterNumbers[fetchIndex++]);
                }

            } catch (err) {
                DOM.display.status.textContent = `❌ Lỗi: ${err.message}`;
                DOM.display.status.className = "status-message error";
                DOM.buttons.fetch.disabled = false;
            }
        });

        const parseImportedText = (text) => {
            const list = [];
            const titlesMap = {};
            const contentsMap = {};
            const rawText = (text || '').trim();
            const standardizedText = '\n' + rawText + '\n';
            const useOldLogic = rawText.startsWith("===");
            const regex = useOldLogic
                ? /\n===\s*Chương\s*(\d+)(?::\s*(.*?))?\s*===\s*([\s\S]*?)(?=\n===\s*Chương|$)/gi
                : /(?:^|\n)Chương\s+(\d+)(?::\s*(.*?))?\s*\n([\s\S]*?)(?=(?:\nChương\s+\d+)|$)/gi;

            let match;
            while ((match = regex.exec(standardizedText)) !== null) {
                const num = parseInt(match[1], 10);
                const title = (match[2] || '').trim();
                const content = (match[3] || '').trim();

                list.push({ num, title, content });

                // For backward compatibility / lookup by number
                titlesMap[num] = title;
                contentsMap[num] = content;
            }
            return { list, titles: titlesMap, contents: contentsMap };
        };

        window.handleFileImport = (event) => {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const { list, titles, contents } = parseImportedText(e.target.result);

                if (list.length === 0) {
                    showToast("❌ File import lỗi format!", "error");
                    return;
                }

                state.importedData = { titles, contents };
                DOM.inputs.startChapter.value = list[0].num;
                DOM.inputs.endChapter.value = list[list.length - 1].num;

                const shouldAutoFill = document.getElementById('autoFillEdited').checked;
                const shouldSplit = document.getElementById('enableSplitChapter').checked;

                state.chapters = [];
                let currentDisplayNum = list[0].num;

                list.forEach(item => {
                    const originalContent = item.content;
                    const num = item.num;
                    const titleText = item.title ? ': ' + item.title : '';

                    if (shouldSplit) {
                        // Apply splitting logic
                        const contentParts = splitChapterContent(originalContent);
                        const totalParts = contentParts.length;

                        contentParts.forEach((partContent, index) => {
                            const isMultiPart = totalParts > 1;
                            const partLabel = isMultiPart ? ` (Phần ${index + 1}/${totalParts})` : "";

                            state.chapters.push({
                                chapterNumber: currentDisplayNum++,
                                header: `Chương ${num}${titleText}${partLabel}`,
                                originalContent: partContent,
                                editedContent: shouldAutoFill ? partContent : "",
                                isError: false,
                                isCopied: false,
                                isGenerated: false
                            });
                        });
                    } else {
                        // No splitting, keep as single chapter
                        state.chapters.push({
                            chapterNumber: currentDisplayNum++,
                            header: `Chương ${num}${titleText}`,
                            originalContent: originalContent,
                            editedContent: shouldAutoFill ? originalContent : "",
                            isError: false,
                            isCopied: false,
                            isGenerated: false
                        });
                    }
                });

                state.currentPage = 1;
                renderCurrentPage();
                DOM.display.status.textContent = `✅ Đã Import ${list.length} chương gốc → ${state.chapters.length} chương sau xử lý.`;
                DOM.buttons.fetch.disabled = false;
                DOM.buttons.download.disabled = false;
            };
            reader.readAsText(file);
        };

        /**
         * =================================================================
         * 9. TTS & VIDEO EXPORT DIALOGS (Basic setup)
         * =================================================================
         */

        window.openTTSDialog = () => {
            if (!state.chapters.length) return showToast("Không có dữ liệu!", "error");
            if (state.chapters.length > 0) {
                document.getElementById('ttsStartChapter').value = state.chapters[0].chapterNumber;
                document.getElementById('ttsEndChapter').value = state.chapters[state.chapters.length - 1].chapterNumber;
            }
            DOM.dialogs.tts.showModal();
        };

        window.openVideoDialog = () => {
            if (state.chapters.length > 0) {
                document.getElementById('videoStartChapter').value = state.chapters[0].chapterNumber;
                document.getElementById('videoEndChapter').value = state.chapters[state.chapters.length - 1].chapterNumber;
            }
            DOM.dialogs.video.showModal();
        };

        window.toggleVoiceField = () => {
            const provider = document.getElementById("ttsProvider").value;
            document.getElementById("voiceGroup").style.display = (provider === "edge") ? "block" : "none";
        };

        window.toggleVideoVoiceField = () => {
            const provider = document.getElementById("videoProvider").value;
            document.getElementById("videoVoiceGroup").style.display = (provider === "edge") ? "block" : "none";
        };
        /**
     * =================================================================
     * BỔ SUNG: EXPORT EPUB FUNCTIONS
     * =================================================================
     */

        const prepareEpubPayload = () => {
            if (state.chapters.length === 0) return null;

            const chapters = {};
            state.chapters.forEach(chap => {
                // Chuyển đổi mảng state hiện tại thành object mà API yêu cầu
                chapters[chap.chapterNumber] = {
                    chapterTitle: chap.header, // Lấy header làm title
                    text: chap.editedContent   // Lấy nội dung đã sửa (hoặc gốc nếu chưa sửa)
                };
            });
            return { chapters };
        };

        window.exportImportedToEpub = async () => {
            const payload = prepareEpubPayload();
            if (!payload) {
                showToast("❌ Không có dữ liệu để xuất EPUB!", "error");
                return;
            }

            try {
                showToast("⏳ Đang tạo file EPUB...", "warning");
                const response = await fetch("/export-epub", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                if (!response.ok || !data.success) throw new Error(data.error || "Lỗi Server Export");

                showToast("✅ Xuất EPUB thành công! Kiểm tra server folder.", "success");
            } catch (err) {
                console.error(err);
                showToast(`❌ Lỗi Export: ${err.message}`, "error");
            }
        };

        window.exportImportedToEpubNoToc = async () => {
            const payload = prepareEpubPayload();
            if (!payload) {
                showToast("❌ Không có dữ liệu để xuất EPUB!", "error");
                return;
            }

            try {
                showToast("⏳ Đang tạo file EPUB (No TOC)...", "warning");
                const response = await fetch("/export-epub-unToc", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                if (!response.ok || !data.success) throw new Error(data.error || "Lỗi Server Export");

                showToast("✅ Xuất EPUB NoToc thành công!", "success");
            } catch (err) {
                console.error(err);
                showToast(`❌ Lỗi Export: ${err.message}`, "error");
            }
        };

        // Các hàm confirmSpeak và confirmVideoExport bạn có thể giữ nguyên logic cũ 
        // hoặc chuyển sang dùng state.chapters để lấy dữ liệu thay vì window.importedContent

        // Page Events
        window.addEventListener("beforeunload", (e) => { e.preventDefault(); e.returnValue = ""; });
        document.addEventListener('DOMContentLoaded', async () => {
            loadFormData(); // Load dữ liệu khi trang web được tải
            try {
                const resp = await fetch(CONFIG.API_ENDPOINTS.STORIES);
                if (!resp.ok) return;
                const stories = await resp.json();
                const select = document.getElementById('videoCover');
                select.innerHTML = '<option value="">-- Chọn truyện --</option>';
                stories.forEach(story => {
                    const opt = document.createElement('option');
                    opt.value = story.id;
                    opt.textContent = story.title;
                    opt.dataset.cover = story.cover;
                    select.appendChild(opt);
                });
            } catch (e) { }
        });
        /**
     * =================================================================
     * BỔ SUNG: LOGIN METRUYEN FUNCTION
     * =================================================================
     */
        window.loginMetruyen = async () => {
            try {
                // 1. Thông báo đang xử lý
                showToast("⏳ Đang kết nối tới Metruyen...", "warning");

                // 2. Gọi API
                const response = await fetch("/loginMetruyen");
                const data = await response.json();

                // 3. Kiểm tra lỗi
                if (!response.ok || data.error) {
                    throw new Error(data.error || `Lỗi HTTP ${response.status}`);
                }

                // 4. Thông báo thành công
                showToast("✅ Đăng nhập thành công!", "success");
                console.log("Login Info:", data); // Log ra console để debug nếu cần

            } catch (err) {
                console.error("Login Error:", err);
                showToast(`❌ Lỗi đăng nhập: ${err.message}`, "error");
            }
        };

        window.initCopilot = async () => {
            const btn = document.getElementById('initCopilot');
            const originalText = btn.textContent;
            btn.textContent = "⏳ Opening...";
            btn.disabled = true;

            try {
                const response = await fetch(CONFIG.API_ENDPOINTS.COPILOT_INIT, { method: 'POST' });
                const data = await response.json();

                if (data.status === 'opened' || data.status === 'open') {
                    showToast("✅ " + data.message, "success");
                    btn.textContent = "✅ Copilot Ready (Log in manually)";
                    setTimeout(() => {
                        btn.disabled = false;
                        btn.textContent = originalText;
                    }, 5000);
                } else {
                    showToast("⚠️ " + (data.error || "Unknown error"), "warning");
                    btn.textContent = originalText;
                    btn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                showToast("❌ Connection failed", "error");
                btn.textContent = originalText;
                btn.disabled = false;
            }
        };
        window.initChatGPT = async () => {
            const btn = document.getElementById('initChatGPT');
            const originalText = btn.textContent;
            btn.textContent = "⏳ Opening...";
            btn.disabled = true;

            try {
                const response = await fetch(CONFIG.API_ENDPOINTS.CHATGPT_INIT, { method: 'GET' });
                const data = await response.json();

                if (data.status === 'opened' || data.status === 'open') {
                    showToast("✅ " + data.message, "success");
                    btn.textContent = "✅ ChatGPT Ready (Log in manually)";
                    setTimeout(() => {
                        btn.disabled = false;
                        btn.textContent = originalText;
                    }, 5000);
                } else {
                    showToast("⚠️ " + (data.error || "Unknown error"), "warning");
                    btn.textContent = originalText;
                    btn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                showToast("❌ Connection failed", "error");
                btn.textContent = originalText;
                btn.disabled = false;
            }
        };

    </script>
</body>
