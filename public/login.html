<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Quản lý Truyện</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="login-page">
    <div class="login-container">
        <div style="text-align: center; margin-bottom: 1rem;">
            <img src="/icon/favico.png" alt="Logo" style="width: 80px; height: 80px; object-fit: contain;">
        </div>
        <h1>Đăng Nhập</h1>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Tài khoản</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div id="error-msg" class="error-msg" style="display: none;"></div>
            <button type="submit">Đăng nhập</button>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/';
                } else {
                    errorMsg.textContent = data.message || 'Đăng nhập thất bại';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Lỗi kết nối';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
