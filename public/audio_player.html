<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Audio Player - Truyện KTTS</title>
    <link rel="icon" href="../../icon/favico.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.5);
            --bg-deep: #0f172a;
            --text-main: #ffffff;
            --text-sub: #94a3b8;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            /* Sử dụng dvh để full màn hình điện thoại chính xác hơn vh thường */
            min-height: 100dvh;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Mesh */
        .bg-mesh {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            background:
                radial-gradient(at 0% 0%, hsla(253, 16%, 7%, 1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 1) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(339, 49%, 30%, 1) 0, transparent 50%);
            background-size: 200% 200%;
            animation: gradientMove 15s ease infinite;
        }

        .bg-orb {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(100px);
            opacity: 0.2;
            border-radius: 50%;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            animation: breathe 8s infinite alternate;
        }

        .container {
            width: 100%;
            height: 100dvh;
            max-width: 480px;
            margin: 0 auto;
            padding: 20px 24px 40px;
            /* Thêm padding đáy cho an toàn */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            backdrop-filter: blur(10px);
        }

        /* Header Area */
        .header {
            text-align: center;
            padding-top: 10px;
        }

        .header h1 {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .header p {
            font-size: 0.8rem;
            color: var(--text-sub);
            margin-top: 4px;
        }

        /* Art Area */
        .visual-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            padding: 20px 0;
        }

        .album-art {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #2e1065, #4c1d95);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
        }

        .album-art::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 30px;
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .album-art span {
            font-size: 5rem;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.2));
            animation: floatIcon 3s ease-in-out infinite;
        }

        /* Track Info */
        .track-info {
            text-align: center;
            width: 100%;
        }

        .track-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            /* white-space: nowrap; */
            overflow: hidden;
            text-overflow: ellipsis;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .track-artist {
            color: var(--text-sub);
            text-overflow: ellipsis;
            overflow: hidden;
            font-size: 1rem;
            white-space: nowrap;
            font-weight: 400;
        }

        /* Controls Area */
        .controls-area {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            /* Bo góc nhỏ hơn xíu */
            padding: 16px 20px;
            /* Giảm padding */
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            gap: 10px;
            /* QUAN TRỌNG: Giảm khoảng cách giữa các dòng từ 20px xuống 10px */
        }

        /* Selection Inputs */
        .selection-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            /* Giảm gap grid */
        }

        select {
            width: 100%;
            padding: 8px 12px;
            /* Giảm chiều cao ô select */
            background-color: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 0.8rem;
            /* Chữ nhỏ lại xíu */
            outline: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 14px;
        }

        /* Full width for story select */
        #storySelect {
            grid-column: span 2;
        }

        /* --- CANVAS WAVEFORM --- */
        .progress-container {
            width: 100%;
            height: 45px;
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 4px;
        }

        canvas#waveformCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            position: relative;
            overflow: visible;
            /* Để hiện cái nút tròn */
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #8b5cf6, #3b82f6);
            border-radius: 10px;
            width: 0%;
            position: relative;
            transition: width 0.1s linear;
        }

        /* Tạo nút tròn (thumb) giả cho thanh progress */
        .progress-fill::after {
            content: '';
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            background-color: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            /* Chữ time nhỏ hơn */
            color: var(--text-sub);
            margin-top: -2px;
            /* Kéo gần lại waveform */
            font-weight: 500;
        }

        /* Main Buttons */
        .main-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            /* Đẩy ra 2 bên cho thoáng */
            padding: 0 10px;
            margin: 4px 0;
        }

        .btn-control {
            background: none;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0.8;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-control:active {
            transform: scale(0.9);
        }

        .btn-control:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn-play {
            width: 56px;
            /* Giảm từ 72px */
            height: 56px;
            background: var(--text-main);
            color: var(--bg-deep);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .btn-play svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* Nút Skip nhỏ lại */
        .btn-skip svg {
            width: 28px;
            height: 28px;
            fill: currentColor;
        }

        /* 5. Thu gọn hàng cài đặt dưới cùng */
        .settings-row {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            padding-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .settings-row select {
            background-color: transparent;
            border: none;
            color: var(--text-sub);
            padding: 5px 0;
            font-size: 0.75rem;
            background-image: none;
            /* Bỏ icon arrow cho gọn */
            text-align: center;
        }

        .settings-row select:focus {
            color: var(--primary);
        }

        /* Loading */
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            flex-direction: column;
        }

        .loading-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(255, 255, 255, 0.95);
            color: #0f172a;
            padding: 12px 24px;
            border-radius: 99px;
            font-weight: 500;
            font-size: 0.9rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            z-index: 100;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Back Button */
        .btn-back {
            position: absolute;
            top: 20px;
            left: 24px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-sub);
            border-radius: 50%;
            transition: all 0.2s;
            z-index: 10;
            text-decoration: none;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
        }

        /* Keyframes */
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes floatIcon {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes breathe {
            0% {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0.1;
            }

            100% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 0.3;
            }
        }

        /* Small screens */
        @media (max-height: 667px) {
            .album-art {
                width: 120px;
                height: 120px;
            }

            .visual-area {
                gap: 10px;
            }

            .container {
                padding: 10px 16px 20px;
            }
        }

        /* --- SUBTITLE / LYRICS AREA --- */
        .subtitle-container {
            display: none;
            /* Mặc định ẩn */
            width: 100%;
            height: 260px;
            /* Chiều cao tương đương khu vực album art */
            overflow-y: auto;
            padding: 20px 10px;
            text-align: center;
            /* Hiệu ứng làm mờ chữ ở đỉnh và đáy để trông mượt mà hơn */
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
            /* Ẩn thanh cuộn nhưng vẫn cuộn được */
            scrollbar-width: none;
        }

        .subtitle-container::-webkit-scrollbar {
            display: none;
        }

        .sub-line {
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--text-sub);
            margin-bottom: 16px;
            transition: all 0.3s ease;
            cursor: pointer;
            font-weight: 400;
        }

        /* Dòng đang đọc (Active) */
        .sub-line.active {
            color: #ffffff;
            font-weight: 700;
            transform: scale(1.05);
            text-shadow: 0 0 10px rgba(139, 92, 246, 0.6);
            /* Glow tím */
        }

        /* Nút Toggle Lyrics (Nằm ở góc Album Art hoặc Control) */
        .btn-toggle-lyrics {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-toggle-lyrics.active {
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        /* Class tiện ích để ẩn hiện */
        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <script>
        if (!localStorage.getItem('user')) {
            window.location.href = '/login';
        }
    </script>
    <!-- Background Effects -->
    <div class="bg-mesh"></div>
    <div class="bg-orb"></div>

    <div class="container">
        <!-- Back Button -->
        <a href="/" class="btn-back" aria-label="Quay lại danh sách">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </a>

        <!-- Top Section -->
        <div class="header">
            <h1>Truyện KTTS</h1>
            <p>Audio Player</p>
        </div>

        <!-- Middle Section: Visuals -->
        <link rel="icon" href="/icon/favico.ico" type="image/x-icon">
        <div class="visual-area">
            <div class="album-art" id="albumArt">
                <span><img src="/icon/favico.png" alt="" style="width:120px;height:120px;margin-top:20px"></span>
            </div>

            <div class="subtitle-container" id="subtitleContainer">
                <p class="sub-line">Dòng 1: Truyện bắt đầu...</p>
                <p class="sub-line active">Dòng 2: Đây là dòng đang đọc (được highlight)</p>
                <p class="sub-line">Dòng 3: Nội dung tiếp theo...</p>
                <p class="sub-line">Dòng 4: Scroll để xem thêm...</p>
                <p class="sub-line">Dòng 5: ...</p>
            </div>

            <div class="track-info" id="trackInfo">
                <div class="track-title" id="currentTrackTitle">Sẵn sàng phát</div>
                <!-- <div class="track-artist" id="currentStoryTitle">Chọn truyện để bắt đầu</div> -->
            </div>
        </div>

        <!-- Bottom Section: Controls -->
        <div class="controls-area" style="position: relative;">
            <!-- Selects -->
            <div class="selection-group">
                <select id="storySelect">
                    <option value="">-- Chọn Truyện --</option>
                </select>
                <select id="chapterSelect" disabled>
                    <option value="">Chương</option>
                </select>
                <!-- Đưa Speed xuống đây để cân đối layout -->
                <select id="speedSelect">
                    <option value="1.0">1.0x</option>
                    <option value="1.25">1.25x</option>
                    <option value="1.5">1.5x</option>
                    <option value="2.0">2.0x</option>
                </select>
            </div>
            <div class="progress-container" id="progressContainer">
                <canvas id="waveformCanvas"></canvas>
            </div>
            <div class="time-info">
                <span id="currentTime">0:00</span>
                <span id="totalTime">--:--</span>
            </div>

            <!-- Play Controls -->
            <div class="main-controls">
                <button class="btn-control btn-skip" id="prevBtn" disabled>
                    <svg viewBox="0 0 24 24">
                        <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
                    </svg>
                </button>

                <button class="btn-control btn-play" id="playBtn" disabled>
                    <svg viewBox="0 0 24 24" id="playIcon">
                        <path d="M8 5v14l11-7z" />
                    </svg>
                    <svg viewBox="0 0 24 24" id="pauseIcon" style="display: none;">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                    </svg>
                </button>

                <button class="btn-control btn-skip" id="nextBtn" disabled>
                    <svg viewBox="0 0 24 24">
                        <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
                    </svg>
                </button>
            </div>

            <!-- Extra Settings (Voice & Sleep Timer) -->
            <div class="settings-row">
                <button id="toggleLyricsBtn" class="btn-toggle-lyrics" aria-label="Hiện lời/sub">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        <line x1="9" y1="10" x2="15" y2="10"></line>
                    </svg>
                </button>

                <button id="sleepTimerBtn"
                    style="background:none; border:none; color:var(--text-sub); font-size:0.75rem; cursor:pointer; display:flex; align-items:center; gap:4px;">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                    <span id="sleepTimerLabel">Hẹn giờ</span>
                </button>

                <div style="display:flex; align-items:center; gap:8px;">
                    <span style="font-size: 0.75rem; color: var(--text-sub);">Giọng đọc:</span>
                    <select id="voiceSelect" style="border:none; text-align: right; width: auto;">
                        <option value="vi-VN-NamMinhNeural">Nam Minh (Nam)</option>
                        <option value="vi-VN-HoaiMyNeural">Hoài My (Nữ)</option>
                        <option value="de-DE-SeraphinaMultilingualNeural">Seraphina (Nữ)</option>
                        <option value="fr-FR-VivienneMultilingualNeural">Vivienne (Nữ)</option>
                        <option value="en-US-EmmaMultilingualNeural">Emma (Nữ)</option>
                        <option value="en-US-BrianMultilingualNeural">Brian (Nam)</option>
                        <option value="fr-FR-RemyMultilingualNeural">Remy (Nam)</option>
                        <option value="it-IT-GiuseppeMultilingualNeural">Giuseppe (Nam)</option>
                        <option value="ko-KR-HyunsuMultilingualNeural">Hyunsu (Nam)</option>
                        <option value="pt-BR-ThalitaMultilingualNeural">Thalita (Nữ)</option>
                    </select>
                </div>
            </div>
            <!-- Loading & Toast -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="spinner"></div>
                <div id="loadingText">Đang tải...</div>
            </div>
        </div>
    </div>

    <!-- Sleep Timer Modal -->
    <div id="sleepTimerModal"
        style="position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:200; display:none; align-items:center; justify-content:center; backdrop-filter:blur(5px);">
        <div
            style="background:var(--bg-deep); padding:24px; border-radius:24px; width:80%; max-width:300px; border:1px solid var(--glass-border); box-shadow:0 20px 50px rgba(0,0,0,0.5);">
            <h3 style="margin-bottom:16px; text-align:center; font-size:1.1rem;">Hẹn giờ tắt</h3>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <button class="timer-opt" data-val="15"
                    style="padding:10px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.05); color:white; cursor:pointer;">15
                    phút</button>
                <button class="timer-opt" data-val="30"
                    style="padding:10px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.05); color:white; cursor:pointer;">30
                    phút</button>
                <button class="timer-opt" data-val="45"
                    style="padding:10px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.05); color:white; cursor:pointer;">45
                    phút</button>
                <button class="timer-opt" data-val="60"
                    style="padding:10px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.05); color:white; cursor:pointer;">60
                    phút</button>
                <button class="timer-opt" data-val="end"
                    style="grid-column:span 2; padding:10px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.05); color:white; cursor:pointer;">Hết
                    chương này</button>
                <button class="timer-opt" data-val="off"
                    style="grid-column:span 2; padding:10px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,50,50,0.2); color:#ff8888; cursor:pointer;">Tắt
                    hẹn giờ</button>
            </div>
            <button id="closeTimerModal"
                style="margin-top:16px; width:100%; padding:10px; background:transparent; border:none; color:var(--text-sub); cursor:pointer;">Đóng</button>
        </div>
